<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>栄養価計算 献立表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .food-card { transition: all 0.2s ease; user-select: none; }
    .food-card:active { transform: scale(0.95); }
    .meal-slot { min-height: 130px; transition: background-color 0.2s; }
    .meal-slot.drag-over { background-color: #dcfce7 !important; border-color: #22c55e !important; }
    .section { display: none; }
    .section.active { display: block; }
    .day-tab.active { background-color: #166534; color: white; font-weight: 700; }
    .storage-box { border: 3px solid #bae6fd; background: #f0f9ff; max-height: 320px; overflow-y: auto; }
    .suggestions { max-height: 200px; overflow-y: auto; background: white; border: 1px solid #ddd; border-radius: 8px; position: absolute; z-index: 50; width: 100%; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-7xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">🍽️ 栄養価計算 献立表</h1>
      <div class="flex gap-2">
        <button onclick="showSection('recipe')" class="px-6 py-3 rounded-2xl font-bold bg-orange-500 text-white">🍳 料理作成</button>
        <button onclick="showSection('menu')" class="px-6 py-3 rounded-2xl font-bold bg-emerald-600 text-white">📅 献立作成</button>
      </div>
    </div>

    <!-- 料理作成 -->
    <div id="recipe-section" class="section active bg-white rounded-3xl shadow p-8">
      <h2 class="text-2xl font-bold mb-6">🍳 料理作成</h2>
      <input id="recipe-name" type="text" placeholder="料理名" class="w-full border-2 rounded-3xl px-6 py-4 text-xl mb-6">
      <div id="ingredients-list" class="space-y-4"></div>
      <button onclick="addIngredientRow()" class="mt-4 px-6 py-3 bg-emerald-500 text-white rounded-2xl">+ 材料追加</button>

      <div class="mt-8 bg-emerald-50 rounded-3xl p-6">
        <h3 class="font-bold mb-4">📊 栄養価（1食分）</h3>
        <div id="nutrition-result" class="grid grid-cols-2 gap-4 text-lg"></div>
      </div>

      <div class="mt-8 flex gap-4">
        <button onclick="createRecipeCard('fridge')" class="flex-1 py-4 bg-sky-500 text-white font-bold rounded-3xl">❄️ 冷蔵庫</button>
        <button onclick="createRecipeCard('freezer')" class="flex-1 py-4 bg-sky-500 text-white font-bold rounded-3xl">🧊 冷凍庫</button>
      </div>
    </div>

    <!-- 献立作成 -->
    <div id="menu-section" class="section bg-white rounded-3xl shadow p-8">
      <h2 class="text-2xl font-bold mb-6">📅 献立作成</h2>
      <div class="flex gap-2 mb-6 overflow-x-auto" id="day-tabs"></div>
      <div id="current-day-header" class="text-3xl font-bold text-emerald-700 mb-6">月</div>
      <div class="grid grid-cols-3 gap-6">
        <!-- 朝昼夕スロット（簡略） -->
        <div class="border-2 border-emerald-100 rounded-3xl p-6">
          <div class="flex items-center gap-3 mb-4"><span class="text-3xl">☀️</span><span class="font-bold text-xl">朝</span></div>
          <div id="slot-morning" class="meal-slot border-2 border-dashed border-emerald-200 rounded-3xl p-4"></div>
          <div class="mt-4 flex gap-3">
            <button onclick="eat('slot-morning')" class="flex-1 py-3 bg-blue-600 text-white rounded-2xl font-bold">食べた</button>
            <button onclick="resetSlot('slot-morning')" class="flex-1 py-3 bg-gray-500 text-white rounded-2xl font-bold">リセット</button>
          </div>
        </div>
        <div class="border-2 border-emerald-100 rounded-3xl p-6">
          <div class="flex items-center gap-3 mb-4"><span class="text-3xl">🍱</span><span class="font-bold text-xl">昼</span></div>
          <div id="slot-noon" class="meal-slot border-2 border-dashed border-emerald-200 rounded-3xl p-4"></div>
          <div class="mt-4 flex gap-3">
            <button onclick="eat('slot-noon')" class="flex-1 py-3 bg-blue-600 text-white rounded-2xl font-bold">食べた</button>
            <button onclick="resetSlot('slot-noon')" class="flex-1 py-3 bg-gray-500 text-white rounded-2xl font-bold">リセット</button>
          </div>
        </div>
        <div class="border-2 border-emerald-100 rounded-3xl p-6">
          <div class="flex items-center gap-3 mb-4"><span class="text-3xl">🌙</span><span class="font-bold text-xl">夕</span></div>
          <div id="slot-evening" class="meal-slot border-2 border-dashed border-emerald-200 rounded-3xl p-4"></div>
          <div class="mt-4 flex gap-3">
            <button onclick="eat('slot-evening')" class="flex-1 py-3 bg-blue-600 text-white rounded-2xl font-bold">食べた</button>
            <button onclick="resetSlot('slot-evening')" class="flex-1 py-3 bg-gray-500 text-white rounded-2xl font-bold">リセット</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 冷蔵庫・冷凍庫 -->
  <div class="max-w-7xl mx-auto p-4 mt-8 grid grid-cols-2 gap-6">
    <div class="storage-box rounded-3xl p-5" id="shared-fridge">
      <div class="font-bold text-sky-600 mb-3"><i class="fa-solid fa-box"></i> 冷蔵庫</div>
    </div>
    <div class="storage-box rounded-3xl p-5" id="shared-freezer">
      <div class="font-bold text-sky-600 mb-3"><i class="fa-solid fa-snowflake"></i> 冷凍庫</div>
    </div>
  </div>

  <script>
    let foodsDB = [];

    async function loadFoods() {
      try {
        const res = await fetch('foods.json');
        foodsDB = await res.json();
        console.log(`✅ ${foodsDB.length}件読み込み完了`);
      } catch(e) {
        console.error('foods.json 読み込み失敗');
      }
    }

    function addIngredientRow() {
      const list = document.getElementById('ingredients-list');
      const id = Date.now();

      const row = document.createElement('div');
      row.className = "flex gap-3 items-end bg-gray-50 p-4 rounded-2xl relative";
      row.innerHTML = `
        <div class="flex-1">
          <input type="text" id="name-${id}" placeholder="食品名 または 食品番号" 
                 class="w-full border rounded-xl px-4 py-3" 
                 oninput="showSuggestions('${id}')" onblur="hideSuggestions('${id}')">
          <div id="suggestions-${id}" class="suggestions hidden"></div>
        </div>
        <input type="number" id="amount-${id}" value="100" class="w-28 border rounded-xl px-4 py-3 text-center" onchange="calculateNutrition()">
        <button onclick="this.parentElement.remove();calculateNutrition()" class="text-red-500 px-4">削除</button>
      `;
      list.appendChild(row);
    }

    function showSuggestions(id) {
      const input = document.getElementById(`name-${id}`);
      const query = input.value.trim().toLowerCase();
      const suggestionsDiv = document.getElementById(`suggestions-${id}`);
      
      if (query.length < 1) {
        suggestionsDiv.classList.add('hidden');
        return;
      }

      const matches = foodsDB.filter(f => 
        (f["食　品　名"] && f["食　品　名"].toLowerCase().includes(query)) ||
        (f["食品番号"] && f["食品番号"].includes(query))
      ).slice(0, 8); // 上位8件

      let html = '';
      matches.forEach(food => {
        html += `
          <div onclick="selectFood('${id}', '${food["食　品　名"]}', this)" 
               class="px-4 py-2 hover:bg-gray-100 cursor-pointer border-b">
            ${food["食品番号"]} ${food["食　品　名"]}
          </div>`;
      });

      suggestionsDiv.innerHTML = html || '<div class="px-4 py-2 text-gray-500">見つかりません</div>';
      suggestionsDiv.classList.remove('hidden');
    }

    function selectFood(id, foodName, element) {
      document.getElementById(`name-${id}`).value = foodName;
      document.getElementById(`suggestions-${id}`).classList.add('hidden');
      calculateNutrition();
    }

    function hideSuggestions(id) {
      setTimeout(() => {
        document.getElementById(`suggestions-${id}`).classList.add('hidden');
      }, 200);
    }

    function calculateNutrition() {
      let total = {kcal: 0, protein: 0, fat: 0, carb: 0};

      document.querySelectorAll('#ingredients-list > div').forEach(row => {
        const nameInput = row.querySelector('input[type="text"]');
        const amountInput = row.querySelector('input[type="number"]');
        
        const name = nameInput.value.trim();
        const amount = parseFloat(amountInput.value) || 0;

        if (name && amount > 0) {
          const food = foodsDB.find(f => 
            (f["食　品　名"] === name) || 
            (f["食品番号"] === name)
          );
          if (food) {
            const ratio = amount / 100;
            total.kcal += parseFloat(food["エネルギー"] || 0) * ratio;
            total.protein += parseFloat(food["たんぱく質"] || 0) * ratio;
            total.fat += parseFloat(food["脂質"] || 0) * ratio;
            total.carb += parseFloat(food["炭水化物"] || 0) * ratio;
          }
        }
      });

      document.getElementById('nutrition-result').innerHTML = `
        <div>🔥 <b>${Math.round(total.kcal)}</b> kcal</div>
        <div>🥩 <b>${total.protein.toFixed(1)}</b> g</div>
        <div>🧈 <b>${total.fat.toFixed(1)}</b> g</div>
        <div>🍚 <b>${total.carb.toFixed(1)}</b> g</div>
      `;
    }

    function createRecipeCard(type) {
      const name = document.getElementById('recipe-name').value.trim() || "無名料理";
      alert(`${name} を${type === 'fridge' ? '冷蔵庫' : '冷凍庫'}に保存しました！`);
    }

    window.onload = () => {
      loadFoods();
      addIngredientRow();
    };
  </script>
</body>
</html>
