<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>栄養価計算 献立表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .food-card { transition: all 0.2s ease; user-select: none; }
    .food-card:active { transform: scale(0.95); }
    .meal-slot { min-height: 160px; transition: all 0.2s; }
    .meal-slot.drag-over { background-color: #dcfce7 !important; border-color: #22c55e !important; scale: 1.02; }
    .section { display: none; }
    .section.active { display: block; }
    .day-tab.active { background-color: #166534; color: white; font-weight: 700; }
    .storage-box { border: 3px solid #bae6fd; background: #f0f9ff; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="max-w-7xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">🍽️ 栄養価計算 献立表</h1>
      <div class="flex gap-2">
        <button onclick="showSection('recipe')" class="px-6 py-3 rounded-2xl font-bold bg-orange-500 text-white hover:bg-orange-600">🍳 料理作成</button>
        <button onclick="showSection('menu')" class="px-6 py-3 rounded-2xl font-bold bg-emerald-600 text-white hover:bg-emerald-700">📅 献立作成</button>
      </div>
    </div>

    <!-- 料理作成 -->
    <div id="recipe-section" class="section active bg-white rounded-3xl shadow p-8">
      <h2 class="text-2xl font-bold mb-6">🍳 料理作成</h2>
      <input id="recipe-name" type="text" placeholder="料理名を入力" 
             class="w-full border-2 rounded-3xl px-6 py-4 text-xl mb-6">

      <div id="ingredients-list" class="space-y-4"></div>
      <button onclick="addIngredientRow()" 
              class="mt-4 px-6 py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl flex items-center gap-2">
        <i class="fa-solid fa-plus"></i> 材料追加
      </button>

      <div class="mt-8 bg-emerald-50 rounded-3xl p-6">
        <h3 class="font-bold mb-4">📊 栄養価（1食分）</h3>
        <div id="nutrition-result" class="grid grid-cols-2 md:grid-cols-4 gap-4 text-lg"></div>
      </div>

      <div class="mt-8 flex gap-4 items-end">
        <div>
          <label class="block font-bold mb-2">食数</label>
          <input id="servings" type="number" value="1" min="1" 
                 class="w-28 border-2 border-gray-200 rounded-3xl px-6 py-4 text-2xl text-center">
        </div>
        <button onclick="createRecipeCard('fridge')" 
                class="flex-1 py-4 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-3xl">❄️ 冷蔵庫に保存</button>
        <button onclick="createRecipeCard('freezer')" 
                class="flex-1 py-4 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-3xl">🧊 冷凍庫に保存</button>
      </div>
    </div>

    <!-- 献立作成 -->
    <div id="menu-section" class="section bg-white rounded-3xl shadow p-8">
      <h2 class="text-2xl font-bold mb-6">📅 献立作成</h2>
      <div class="flex gap-2 mb-6 overflow-x-auto pb-2" id="day-tabs"></div>
      <div id="current-day-header" class="text-3xl font-bold text-emerald-700 mb-6"></div>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- 朝 -->
        <div class="border-2 border-emerald-100 rounded-3xl p-6">
          <div class="flex items-center gap-3 mb-4"><span class="text-3xl">☀️</span><span class="font-bold text-xl">朝食</span></div>
          <div id="slot-morning" class="meal-slot border-2 border-dashed border-emerald-200 rounded-3xl p-4" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>
        <!-- 昼 -->
        <div class="border-2 border-emerald-100 rounded-3xl p-6">
          <div class="flex items-center gap-3 mb-4"><span class="text-3xl">🍱</span><span class="font-bold text-xl">昼食</span></div>
          <div id="slot-noon" class="meal-slot border-2 border-dashed border-emerald-200 rounded-3xl p-4" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>
        <!-- 夕 -->
        <div class="border-2 border-emerald-100 rounded-3xl p-6">
          <div class
